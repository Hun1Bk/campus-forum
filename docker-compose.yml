services:
  mysql:
    image: mysql:8.0
    container_name: campus-forum-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-kob}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/forum_schema.sql:/docker-entrypoint-initdb.d/01-forum-schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: campus-forum-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3000}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME:-kob}
      DB_URL: "jdbc:mysql://mysql:3306/${DB_NAME:-kob}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&allowPublicKeyRetrieval=true&useSSL=false"
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_HOST: ${MAIL_HOST:-smtp.qq.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    volumes:
      - backend-uploads:/app/uploads

  frontend:
    build:
      context: ./space
      args:
        VUE_APP_API_BASE_URL: /api
    container_name: campus-forum-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_PORT: ${BACKEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-8081}:80"

volumes:
  mysql-data:
  backend-uploads:
